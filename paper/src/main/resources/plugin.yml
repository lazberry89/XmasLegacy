name: XmasLegacy
version: '12.25.0.6.dev'

main: org.lazberry.xmaslegacy.XmasLegacy
api-version: '1.21.11'
load: POSTWORLD
depend: [floodgate]
softdepend: [oraxen]
commands:
  문의: #0
    usage: /문의 <내용>
    description: 문의를 하여 관리자를 호출합니다.

  이동문의: #0
    usage: /이동문의 <유저>
    description: 문의를 받고 해당 유저로 이동합니다.

  가방: #0
    usage: /가방
    description: 유저별 개인 저장공간을 제공합니다.

  filter: #0
    usage: /filter <append | remove | list> <word>
    description: 욕설 필터 목록 설정

  log: #0
    usage: /log <inquiry | inquiries> <이름>
    description: 로그 검색

  구역: #0
    usage: /구역 <ID> <설정> <값>
    description: 구역 설정

  vanish: #0
    usage: /vanish
    description: 리스트, 인게임에서 소멸 후 유저관찰

  lobby: #0
    usage: /lobby <set | location | reset>
    description: 로비설정

  currency: #0
    usage: /currency <add | remove | set | check | transfer> <Player(Player, Player)> <amount>
    description: 금전 이동,확인,설정

  cos: #0
    usage: /cos <add | remove | equip | unequip> <Name>
    description: 치장을 관리합니다.

  상점: #0
    usage: /상점
    description: 공용 상점을 여는 명령어에요.
  
  직업선택: #0
    usage: /직업선택

  prefix: #0
    usage: /prefix inv
    description: 칭호를 설정합니다.

  파티:
    usage: /파티 <생성 | 초대 | 수락 | 거절 | 나가기> <Player>
    description: 파티를 관리합니다.

  party:
    usage: /party <create | invite | leave | expel> <Player>
    description: 파티를 관리합니다.

  pt:
    usage: /pt <create | invite | leave | expel> <Player>
    description: 파티를 관리합니다.

  location:
    description: 위치를 설치하고 저장, 불러오기, 유저 이동을 담당한다.

  role:
    description: 직업을 강제로 변경합니다.

  gacha:
    description: 가챠 시스템 명령어

  head:
    description: 손의 아이템을 머리에 씌운다.

  test:
    description: 1차직업 무기, 책 아이템 꺼내기용 명령어

  potion:
    description: 성직자의 포션을 꺼낸다.

  system:
    description: 테스트용 상점 명령어. 적극 수정 필요

  shop:
    description: 상점을 연다.

  book:
    description: 직업 선택 책 아이템 디스플레이를 생성한다.

  delstand:
    description: 스폰되어있는 책을 삭제한다.

  0947345:
    description: 강제로 내 유저정보를 불러오는 오직 테스트용 명령어

  second:
    description: 2차직업 아이템 꺼내기용 테스트 명령어다.

  강화:
    description: 테스트용 강화 GUI 오픈 명령어다.

  zone:
    description: 사냥터 구역 설정 명령어다.

  guide:
    description: npc의 가이드 대사를 출력한다.

  icing:
    description: 빙결수치 스케쥴러를 조정한다.

  clearpdc:
    description: 유저의 PersistentDataContainer의 값을 지운다.

  rank:
    usage: /rank <self | task | name> <RankType> <Value>
    description: ranking command


